<svg
  width="40"
  height="40"
  viewBox="0 0 40 40"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="項目追加"
>
  <style>
    :root {
      --item-add-fg: rgba(30, 64, 175, 0.96);
    }
  </style>

  <!-- plus circle -->
  <circle
    cx="20"
    cy="20"
    r="10"
    fill="none"
    stroke="var(--item-add-fg)"
    stroke-width="2.4"
  />

  <!-- plus -->
  <path
    d="M20 14.2V25.8"
    stroke="var(--item-add-fg)"
    stroke-width="2.8"
    stroke-linecap="round"
  />
  <path
    d="M14.2 20H25.8"
    stroke="var(--item-add-fg)"
    stroke-width="2.8"
    stroke-linecap="round"
  />
</svg>