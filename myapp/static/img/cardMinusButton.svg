<svg
  width="40"
  height="40"
  viewBox="0 0 40 40"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="カード削除"
>
  <style>
    :root {
      --card-delete-fg: rgba(185, 28, 28, 0.96);
    }
  </style>

  <!-- card -->
  <rect
    x="7"
    y="10"
    width="26"
    height="18"
    rx="4"
    stroke="var(--card-delete-fg)"
    stroke-width="2.2"
  />

  <!-- card top line -->
  <path
    d="M9.8 15H30.2"
    stroke="var(--card-delete-fg)"
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.9"
  />

  <!-- minus badge -->
  <circle
    cx="29"
    cy="28.5"
    r="5.2"
    fill="white"
    stroke="var(--card-delete-fg)"
    stroke-width="2"
  />

  <!-- minus -->
  <path
    d="M26.8 28.5H31.2"
    stroke="var(--card-delete-fg)"
    stroke-width="2.2"
    stroke-linecap="round"
  />
</svg>