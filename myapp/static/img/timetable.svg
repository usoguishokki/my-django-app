<svg
  width="98"
  height="98"
  viewBox="0 0 98 98"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="タイムテーブル"
>
  <!-- Calendar body -->
  <rect x="12" y="17" width="72" height="68" rx="8" fill="white" stroke="#111111" stroke-width="3"/>

  <!-- Calendar header -->
  <path
    d="M20 17H76C80.4183 17 84 20.5817 84 25V35H12V25C12 20.5817 15.5817 17 20 17Z"
    fill="#111111"
  />

  <!-- Binding rings -->
  <circle cx="32" cy="25" r="5.5" fill="white"/>
  <circle cx="66" cy="25" r="5.5" fill="white"/>
  <rect x="28" y="9" width="8" height="19" rx="4" fill="#111111"/>
  <rect x="62" y="9" width="8" height="19" rx="4" fill="#111111"/>

  <!-- Timetable grid: light slots -->
  <rect x="20" y="42" width="11" height="8" rx="2" fill="#D9D9D9"/>
  <rect x="35" y="42" width="11" height="8" rx="2" fill="#D9D9D9"/>
  <rect x="50" y="42" width="11" height="8" rx="2" fill="#111111"/>
  <rect x="65" y="42" width="11" height="8" rx="2" fill="#D9D9D9"/>

  <rect x="20" y="54" width="11" height="8" rx="2" fill="#D9D9D9"/>
  <rect x="35" y="54" width="11" height="8" rx="2" fill="#111111"/>
  <rect x="50" y="54" width="11" height="8" rx="2" fill="#D9D9D9"/>
  <rect x="65" y="54" width="11" height="8" rx="2" fill="#111111"/>

  <rect x="20" y="66" width="11" height="8" rx="2" fill="#D9D9D9"/>
  <rect x="35" y="66" width="11" height="8" rx="2" fill="#D9D9D9"/>
  <rect x="50" y="66" width="11" height="8" rx="2" fill="#D9D9D9"/>

  <rect x="20" y="78" width="11" height="5" rx="2" fill="#D9D9D9"/>
  <rect x="35" y="78" width="11" height="5" rx="2" fill="#111111"/>

  <!-- Clock badge -->
  <circle cx="68" cy="68" r="21" fill="white" stroke="#111111" stroke-width="5"/>
  <circle cx="68" cy="68" r="3.5" fill="#111111"/>

  <!-- Clock ticks -->
  <rect x="66.5" y="50" width="3" height="7" rx="1.5" fill="#111111"/>
  <rect x="66.5" y="79" width="3" height="7" rx="1.5" fill="#111111"/>
  <rect x="50" y="66.5" width="7" height="3" rx="1.5" fill="#111111"/>
  <rect x="79" y="66.5" width="7" height="3" rx="1.5" fill="#111111"/>

  <!-- Clock hands -->
  <path d="M68 68L80 56" stroke="#111111" stroke-width="5" stroke-linecap="round"/>
  <path d="M68 68L78 78" stroke="#111111" stroke-width="5" stroke-linecap="round"/>
</svg>
