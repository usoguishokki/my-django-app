<div class="csv-download__field">
    <label class="csv-download__label" for="{{ hidden_id }}">
        {{ label }}
        {% if required %}
            <span class="csv-download__required">必須</span>
        {% endif %}
    </label>

    <div
        class="custom-dropdown"
        data-role="dropdown"
        data-dropdown-key="{{ combobox_key }}"
        data-state="closed"
    >
        <input
            type="hidden"
            id="{{ hidden_id }}"
            name="{{ field_name }}"
            value=""
            data-role="dropdown-input"
        >

        <button
            type="button"
            id="{{ trigger_id }}"
            class="custom-dropdown__trigger"
            data-role="dropdown-trigger"
            {% if disabled %}disabled{% endif %}
        >
            <span data-role="dropdown-trigger-text">
                {{ placeholder }}
            </span>
        </button>

        <div
            class="custom-dropdown__panel"
            data-role="dropdown-panel"
            hidden
        >
            <div
                id="{{ listbox_id }}"
                class="custom-dropdown__list"
                data-role="dropdown-list"
            ></div>
        </div>
    </div>

    {% if help_text %}
        <p class="csv-download__helpText">{{ help_text }}</p>
    {% endif %}
</div>
